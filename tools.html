<div style="max-width: 600px; margin: 40px auto; text-align: center; font-family: sans-serif;">
    <h2>🖼️ 图片压缩工具 (纯本地处理)</h2>
    <p>选择图片后，系统将在您的浏览器内自动将其压缩至 <strong>2MB (2048KB)</strong> 以内并转为JPG格式。整个过程不会上传任何数据，保护您的隐私。</p>
    
    <div style="border: 2px dashed #ccc; padding: 30px; border-radius: 10px; background-color: #f9f9f9; margin-top: 20px;">
        <input type="file" id="uploadInput" accept="image/png, image/jpeg, image/jpg" style="margin-bottom: 15px;">
        <p id="status" style="color: #666; font-weight: bold;"></p>
        <button id="downloadBtn" style="display: none; padding: 10px 20px; background-color: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px;">
            ⬇️ 下载压缩后的图片
        </button>
    </div>
</div>

<script>
    const uploadInput = document.getElementById('uploadInput');
    const statusText = document.getElementById('status');
    const downloadBtn = document.getElementById('downloadBtn');

    uploadInput.addEventListener('change', function(event) {
        const file = event.target.files[0];
        if (!file) return;

        statusText.innerText = "处理中，请稍候...";
        downloadBtn.style.display = 'none';

        const reader = new FileReader();
        reader.onload = function(e) {
            const img = new Image();
            img.onload = function() {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = img.width;
                canvas.height = img.height;
                ctx.drawImage(img, 0, 0);

                let quality = 0.95;
                let dataUrl = canvas.toDataURL('image/jpeg', quality);
                
                // 目标大小：2048KB
                // Base64 编码的体积比实际文件大 1/3，所以实际文件大小约等于 length * 0.75
                const targetSizeBytes = 2048 * 1024;

                // 第一阶段：降低画质
                while ((dataUrl.length * 0.75) > targetSizeBytes && quality > 0.1) {
                    quality -= 0.05;
                    dataUrl = canvas.toDataURL('image/jpeg', quality);
                }

                // 第二阶段：如果画质降到底还是大，则降低分辨率
                let scale = 1.0;
                while ((dataUrl.length * 0.75) > targetSizeBytes && scale > 0.2) {
                    scale -= 0.1;
                    canvas.width = img.width * scale;
                    canvas.height = img.height * scale;
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    dataUrl = canvas.toDataURL('image/jpeg', 0.6); // 降低分辨率时保持中等画质
                }

                const finalSizeKB = ((dataUrl.length * 0.75) / 1024).toFixed(2);
                statusText.innerText = `✅ 压缩完成！当前大小: ${finalSizeKB} KB`;
                statusText.style.color = "#28a745";
                
                downloadBtn.style.display = 'inline-block';
                downloadBtn.onclick = function() {
                    const link = document.createElement('a');
                    link.download = 'compressed_image.jpg';
                    link.href = dataUrl;
                    link.click();
                };
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    });
</script>
